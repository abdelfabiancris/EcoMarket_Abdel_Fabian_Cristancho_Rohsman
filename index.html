<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>EcoMarket</title>

    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">

</head>

<body>

    <!-- ==========================
    HEADER
    =========================== -->

    <header class="header">

        <div class="container">

            <div class="logo">

                <img src="img/icons/logo.svg" alt="EcoMarket Logo">

                <h1>EcoMarket</h1>

            </div>

            <nav class="navbar">

                <ul>

                    <li><a href="index.html" class="active">Home</a></li>

                    <li><a href="views/productos.html">Store</a></li>

                    <li><a href="views/sobre-nosotros.html">Our Story</a></li>

                    <li><a href="views/contacto.html">Contact</a></li>

                </ul>

            </nav>

            <div class="header-icons">

                <a href="#" title="Search">

                    <img src="img/icons/search.svg" alt="Search">

                </a>

                <a href="#" class="cart" title="Shopping Cart">

                    <img src="img/icons/bag.svg" alt="Shopping Bag">

                    <span>2</span>

                </a>

                <a href="#" title="Dark Mode">

                    <img src="img/icons/moon.svg" alt="Dark Mode">

                </a>

            </div>

        </div>

    </header>

    <!-- ==========================
    MAIN
    =========================== -->

    <main>

    <!-- ==========================
    HERO
    =========================== -->

    <section class="hero">

        <div class="hero-content">

            <span class="hero-tag">
                Sustainable Living
            </span>

            <h2>
                Nature in Every <br>
                Purchase
            </h2>

            <p>
                Discover thoughtfully curated eco-friendly products that help you
                live greener without compromising quality or style.
            </p>

            <div class="hero-buttons">

                <a href="views/productos.html" class="btn btn-primary">
                    Shop New Arrivals
                </a>

                <a href="views/sobre-nosotros.html" class="btn btn-secondary">
                    Learn Our Impact
                </a>

            </div>

        </div>

    </section>

    <!-- ==========================
    CATEGORIES
    =========================== -->

    <section class="categories">

    </section>

    <!-- ==========================
    FEATURED PRODUCTS
    =========================== -->

    <section class="featured">

    </section>

    <!-- ==========================
    NEWSLETTER
    =========================== -->

    <section class="newsletter">

    </section>

</main>

<!-- ==========================
    FOOTER
    =========================== -->

    <footer>

    </footer>
